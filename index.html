<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kefei Wu | Portfolio</title>
    <meta
      name="description"
      content="Personal portfolio with profile, selected projects, and contact information."
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <nav class="site-nav site-nav-left" aria-label="Primary">
          <a href="#profile" data-i18n="nav.profile"></a>
          <a href="#projects" data-i18n="nav.projects"></a>
        </nav>

        <a class="brand" href="#top" aria-label="Homepage">
          <span class="brand-word">Kefei</span>
          <span class="brand-orbit" aria-hidden="true"></span>
          <span class="brand-word">Wu</span>
        </a>

        <div class="header-actions">
          <nav class="site-nav site-nav-right" aria-label="Secondary">
            <a href="#contact" data-i18n="nav.contact"></a>
          </nav>

          <div class="language-toggle" role="group" aria-label="Language Switch">
            <button type="button" class="lang-button" data-lang="zh">中</button>
            <button type="button" class="lang-button" data-lang="en">EN</button>
          </div>
        </div>
      </header>

      <main id="top">
        <section class="hero-stage" id="profile">
          <p class="eyebrow" data-i18n="hero.eyebrow"></p>

          <div class="hero-grid">
            <div class="hero-title-stack">
              <h1 class="hero-title">
                <span data-i18n="site.name"></span>
              </h1>
              <p class="hero-echo" aria-hidden="true">
                <span data-i18n="site.name"></span>
              </p>
            </div>

            <div class="hero-side">
              <p class="hero-role" data-i18n="hero.role"></p>
              <p class="hero-description" data-i18n="hero.description"></p>

              <div class="hero-actions">
                <a class="primary-button" href="#projects" data-i18n="hero.primaryAction"></a>
                <a class="secondary-button" href="#contact" data-i18n="hero.secondaryAction"></a>
              </div>
            </div>
          </div>

          <div class="hero-visual-block">
            <div class="signal-panel">
              <div class="signal-cutout" aria-hidden="true"></div>
              <div class="portrait-frame">
                <img id="profile-image" src="" alt="" />
              </div>
            </div>
            <div class="hero-marquee" id="hero-marquee" aria-hidden="true"></div>
          </div>

          <ul class="hero-highlights" id="highlights-list" aria-label="Highlights"></ul>
        </section>

        <section class="section-block" id="projects">
          <div class="section-heading">
            <p class="section-kicker" data-i18n="projects.kicker"></p>
            <h2 data-i18n="projects.title"></h2>
            <p class="section-intro" data-i18n="projects.intro"></p>
          </div>

          <div class="project-grid" id="projects-grid"></div>
        </section>

        <section class="section-block contact-block" id="contact">
          <div class="section-heading">
            <p class="section-kicker" data-i18n="contact.kicker"></p>
            <h2 data-i18n="contact.title"></h2>
            <p class="section-intro" data-i18n="contact.intro"></p>
          </div>

          <div class="contact-grid" id="contact-grid"></div>
        </section>
      </main>

      <footer class="site-footer">
        <p>
          <span data-i18n="footer.text"></span>
          <span id="current-year"></span>
        </p>
      </footer>
    </div>

    <script src="scripts/content.js"></script>
    <script src="scripts/main.js"></script>
  </body>
</html>
